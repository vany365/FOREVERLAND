[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

[profile.default.fuzz]
runs = 1000

[rpc_endpoints]
monad = "${MONAD_RPC_URL}"

[etherscan]
monad = { key = "${MONADSCAN_API_KEY}", url = "https://api.monadscan.com/api" }
